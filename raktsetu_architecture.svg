<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" width="100%" height="100%" style="background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Shadow filter for clean premium lookup -->
    <filter id="box-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.05" />
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
    
    <!-- Directional Arrow Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
    
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#0f52ba" />
    </marker>

    <!-- Background Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.7" />
    </pattern>
  </defs>

  <!-- Apply Background Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Diagram Title -->
  <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="800" fill="#0f172a" letter-spacing="1">RAKTASETU - SYSTEM ARCHITECTURE</text>
  <text x="450" y="65" text-anchor="middle" font-size="13" font-weight="500" fill="#64748b" letter-spacing="0.5">National Digital Blood Portal | MERN Stack Architecture Map</text>

  <!-- ================= USER LEVEL ================= -->
  <g id="user-node">
    <rect x="360" y="100" width="180" height="50" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#box-shadow)" />
    <text x="450" y="130" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Voluntary Donor / Client</text>
  </g>

  <path d="M 450 150 L 450 190" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ================= FRONTEND LEVEL (Vercel / Render Static) ================= -->
  <g id="frontend-container">
    <!-- Main Outer Container -->
    <rect x="50" y="195" width="800" height="260" rx="20" fill="#ffffff" stroke="#0f52ba" stroke-width="2" filter="url(#card-shadow)" />
    <rect x="50" y="195" width="800" height="40" rx="20" fill="#0f52ba" />
    <rect x="50" y="215" width="800" height="20" fill="#0f52ba" />
    <text x="70" y="221" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">FRONTEND ENVIRONMENT (React.js + Vite | Deployed on Vercel/Render)</text>

    <!-- Sub-Modules -->
    <!-- Donor Profile -->
    <rect x="80" y="260" width="160" height="70" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="160" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Donor Registration</text>
    <text x="160" y="308" text-anchor="middle" font-size="10" font-weight="500" fill="#64748b">&amp; Profile Module</text>

    <!-- Digital Donor ID -->
    <rect x="260" y="260" width="160" height="70" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="340" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Digital Donor ID</text>
    <text x="340" y="308" text-anchor="middle" font-size="10" font-weight="500" fill="#64748b">Identity Card Card</text>

    <!-- Certificate Gen -->
    <rect x="440" y="260" width="160" height="70" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="520" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Certificate Module</text>
    <text x="520" y="308" text-anchor="middle" font-size="10" font-weight="500" fill="#64748b">Appreciation PDF Gen</text>

    <!-- Donor Search & Stock -->
    <rect x="640" y="260" width="180" height="70" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
    <text x="730" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Donor &amp; Camps Search</text>
    <text x="730" y="308" text-anchor="middle" font-size="10" font-weight="500" fill="#64748b">Blood Stock Status Tracker</text>

    <!-- Core Services / Axios Client -->
    <rect x="80" y="365" width="740" height="60" rx="12" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5" />
    <text x="450" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">Axios API Gateway Client (Dynamic Base URL &amp; JWT Token Interceptor)</text>
    <text x="450" y="408" text-anchor="middle" font-size="10" font-weight="500" fill="#075985">VITE_API_BASE_URL resolution | Auto Auth Headers configuration</text>
  </g>

  <!-- Link: Frontend -> API Gateway -->
  <path d="M 450 455 L 450 515" fill="none" stroke="#0f52ba" stroke-dasharray="4" stroke-width="2" marker-end="url(#arrow-blue)" />
  <text x="460" y="490" font-size="11" font-weight="700" fill="#0f52ba">Axios HTTP Request Payload (JSON + Bearer Token)</text>

  <!-- ================= BACKEND LEVEL (Render Web Service) ================= -->
  <g id="backend-container">
    <!-- Main Outer Container -->
    <rect x="50" y="520" width="800" height="420" rx="20" fill="#ffffff" stroke="#c0392b" stroke-width="2" filter="url(#card-shadow)" />
    <rect x="50" y="520" width="800" height="40" rx="20" fill="#c0392b" />
    <rect x="50" y="540" width="800" height="20" fill="#c0392b" />
    <text x="70" y="546" font-size="14" font-weight="800" fill="#ffffff" letter-spacing="0.5">BACKEND ENVIRONMENT (Node.js + Express | Deployed on Render Web Service)</text>

    <!-- JWT Middleware Auth Wall -->
    <rect x="250" y="580" width="400" height="55" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
    <text x="450" y="605" text-anchor="middle" font-size="13" font-weight="800" fill="#991b1b">JWT Verification Middleware (Auth Wall)</text>
    <text x="450" y="622" text-anchor="middle" font-size="10" font-weight="500" fill="#7f1d1d">Validates signature headers | Injects user context profiles</text>

    <!-- Router path links -->
    <path d="M 450 635 L 450 670" fill="none" stroke="#991b1b" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Controller Layer -->
    <g id="controllers">
      <rect x="70" y="670" width="760" height="110" rx="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="90" y="692" font-size="11" font-weight="800" fill="#475569" letter-spacing="0.5">EXPRESS CONTROLLERS / CONTROLLER LAYER</text>

      <!-- Auth Controller -->
      <rect x="90" y="705" width="130" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="155" y="730" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Auth Controller</text>
      <text x="155" y="745" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Register / Login</text>

      <!-- Donor & Image Upload Controller -->
      <rect x="235" y="705" width="150" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="310" y="725" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Donor &amp; Upload</text>
      <text x="310" y="738" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">Multer Profile Pic</text>
      <text x="310" y="750" text-anchor="middle" font-size="8" font-weight="500" fill="#64748b">Uploads handler static</text>

      <!-- Blood Requests & Camps -->
      <rect x="400" y="705" width="150" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="475" y="730" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Requests &amp; Camps</text>
      <text x="475" y="745" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Urgent post list</text>

      <!-- Stock & Certificate -->
      <rect x="565" y="705" width="150" height="60" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="640" y="730" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Stock &amp; Certificate</text>
      <text x="640" y="745" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Appreciation metrics</text>

      <!-- Static Files Access -->
      <rect x="730" y="705" width="85" height="60" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1" />
      <text x="772" y="730" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Static Serving</text>
      <text x="772" y="745" text-anchor="middle" font-size="8" font-weight="500" fill="#b45309">/uploads</text>
    </g>

    <path d="M 450 780 L 450 805" fill="none" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Database Models Layer -->
    <g id="models">
      <rect x="70" y="810" width="760" height="110" rx="15" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" />
      <text x="90" y="832" font-size="11" font-weight="800" fill="#475569" letter-spacing="0.5">MONGOOSE DATA MODELS / SCHEMA LAYER</text>

      <!-- Donor Model -->
      <rect x="110" y="845" width="140" height="55" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="180" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Donor.js</text>
      <text x="180" y="885" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Profile health credentials</text>

      <!-- BloodRequest Model -->
      <rect x="270" y="845" width="160" height="55" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="350" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">BloodRequest.js</text>
      <text x="350" y="885" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Urgent hospital needs</text>

      <!-- BloodCamp Model -->
      <rect x="450" y="845" width="160" height="55" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="530" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">BloodCamp.js</text>
      <text x="530" y="885" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Attendance slots</text>

      <!-- BloodStock Model -->
      <rect x="630" y="845" width="140" height="55" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1" />
      <text x="700" y="870" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">BloodStock.js</text>
      <text x="700" y="885" text-anchor="middle" font-size="9" font-weight="500" fill="#64748b">Stock status parameters</text>
    </g>
  </g>

  <!-- Link: Backend -> Database -->
  <path d="M 450 940 L 450 990" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow)" />
  <text x="460" y="970" font-size="11" font-weight="700" fill="#27ae60">Mongoose Connection (MongoDB Protocol)</text>

  <!-- ================= DATABASE LEVEL ================= -->
  <g id="database-node">
    <rect x="300" y="995" width="300" height="65" rx="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" filter="url(#card-shadow)" />
    <text x="450" y="1025" text-anchor="middle" font-size="15" font-weight="800" fill="#1b5e20">MONGODB ATLAS</text>
    <text x="450" y="1045" text-anchor="middle" font-size="10" font-weight="500" fill="#2e7d32">Cloud-Hosted Document Database Cluster</text>
  </g>
</svg>
